services:
  backend:
    image: vinay810/content_moderation-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    # Override command to enable hot-reloading for development
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: vinay810/content_moderation-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Anonymous volume for node_modules so we don't overwrite container's node_modules with local host's node_modules if it exists
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
